version: '3.9'

services:

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  authservice:
    build: ./services/AuthService
    container_name: authservice
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__Connection=redis:6379
    depends_on:
      - redis

  userservice:
    build: ./services/UserService
    container_name: userservice
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__Connection=redis:6379
    depends_on:
      - redis

  chatservice:
    build: ./services/ChatService
    container_name: chatservice
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__Connection=redis:6379
    depends_on:
      - redis

  recommendpostservice:
    build: ./services/RecommendPostService
    container_name: recommendpostservice
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - redis

  apigateway:
    build: ./gateway/ApiGateway
    container_name: apigateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - authservice
      - userservice
      - chatservice
      - recommendpostservice

  frontend:
    build: ./front-end
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - apigateway