services:
  mysql:
    image: mysql:8.0
    container_name: theblogproject-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_DATABASE=theblogproject
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - mysql_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: theblogproject-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  redis:
    image: redis/redis-stack-server:latest
    container_name: theblogproject-redis
    ports:
      - "6379:6379"
      - "8001:8001"

volumes:
  mysql_data:
